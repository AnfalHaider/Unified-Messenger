name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        rid: [win-x64, win-arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore UnifiedMessenger.sln

      - name: Build
        run: dotnet build UnifiedMessenger.sln --configuration Release --no-restore -p:Platform=x64

      - name: Test
        run: dotnet test UnifiedMessenger.sln --configuration Release --no-build --verbosity normal -p:Platform=x64

      - name: Publish ${{ matrix.rid }}
        run: dotnet publish UnifiedMessenger/UnifiedMessenger.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishReadyToRun=false -p:Platform=x64

      - name: Build installer (x64 only)
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup -y --no-progress
            $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          }
          if (Test-Path $iscc) {
            & $iscc installer.iss
          } else {
            Write-Warning "Inno Setup not available; skipping installer build."
          }
