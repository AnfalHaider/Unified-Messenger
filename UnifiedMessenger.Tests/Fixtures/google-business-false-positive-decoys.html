<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8" /><title>Google Business fixture</title></head>
<body>
  <aside>
    <span>4</span>
    <span>unreplied</span>
    <span>12 total reviews</span>
    <span aria-label="4.8 stars average rating">Rating</span>
  </aside>
  <div role="main">
    <span aria-label="See all reviews">Reviews</span>
    <span>4 star rating</span>
    <span>12 total reviews</span>
    <div role="listitem" aria-label="Customer review — you replied" data-review-id="rev-replied">
      <span>Jane Doe</span>
      <span>Great service</span>
      <span>Your reply was posted yesterday</span>
    </div>
    <div role="listitem" data-review-id="rev-unreplied">
      <span>Alex Kim</span>
      <span>2 unreplied reviews need reply</span>
      <span>Waiting too long — awaiting your response</span>
    </div>
    <div aria-label="1 unreplied review pending reply"></div>
  </div>
</body>
</html>
